services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrator:
    build: ./api
    env_file: .env.docker
    networks:
      - appnet
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    command: sh -lc "sh ./start.sh migrate"

  api:
    build: ./api
    env_file: .env.docker
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - ./.env.docker:/app/.env:ro
    networks:
      - appnet
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    command: sh -lc "sh ./start.sh start"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8000)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: ./web
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./web:/web
      - /web/node_modules
    networks:
      - appnet
    depends_on:
      api:
        condition: service_healthy

networks:
  appnet:

volumes:
  pgdata: